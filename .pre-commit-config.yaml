repos:
  - repo: local
    hooks:
      - id: no-temp-folder
        name: Prevent temp/ and tmp/ folder commits
        entry: bash -c 'TEMP_FILES=$(git diff --cached --name-only | grep -E "^temp/|/temp/|^tmp/|/tmp/"); if [ -n "$TEMP_FILES" ]; then echo "ERROR - temp/tmp folders not allowed in repos."; echo "Use C:/temp/ instead and delete the folder."; echo ""; echo "Blocked files -"; echo "$TEMP_FILES"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-hardcoded-params
        name: Check for hardcoded parameters
        entry: bash scripts/check-hardcoded-params.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-closure-loop-applied
        name: Stage 1 closure-loop applied_in propagation gate (#460 Phase 6 W1; consumer-repo propagation)
        # Fires on commits with Phase: 4 or Phase: 5 trailer. Invokes the
        # dotfiles canonical script via relative path (consumer is sibling of
        # dotfiles under ~/DevProjects/). Skip-cleanly if dotfiles unavailable.
        # Bypass: SKIP=sst3-closure-loop-applied git commit ...
        entry: bash
        args:
          - -c
          - |
            msg_file="$1"
            phase=$(grep -E "^Phase:[[:space:]]*[0-9]+" "$msg_file" | head -1 | grep -oE "[0-9]+" | head -1 || true)
            test -n "$phase" || exit 0
            test "$phase" = "4" -o "$phase" = "5" || exit 0
            branch=$(git rev-parse --abbrev-ref HEAD)
            issue=$(echo "$branch" | grep -oE "issue-[0-9]+" | grep -oE "[0-9]+" | head -1 || true)
            test -n "$issue" || exit 0
            CANONICAL=../dotfiles/SST3/scripts/check-closure-loop-applied.py
            [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles canonical not found at $CANONICAL" >&2; exit 0; }
            python3 "$CANONICAL" --repo ebay-seller-tool "$issue"
          - --
        language: system
        stages: [commit-msg]
        always_run: true
        verbose: true

      # >>> SST3 MANAGED BLOCK — DO NOT EDIT — propagated by propagate-block.py >>>
      - id: sst3-mirror-drift
        name: SST3 vendored file drift check (manifest-driven, staged-aware)
        entry: python3 scripts/check-mirror-drift.py --repo ebay-seller-tool
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-mirror-drift-strict
        name: SST3 vendored file drift check (strict, push-time repo-wide)
        entry: python3 scripts/check-mirror-drift.py --repo ebay-seller-tool --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: sst3-managed-block-drift
        name: SST3 managed-block drift check (boundary-marker integrity, staged-aware)
        entry: python3 scripts/check-mirror-drift.py --repo ebay-seller-tool --managed-blocks
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-managed-block-drift-strict
        name: SST3 managed-block drift check (strict, push-time)
        entry: python3 scripts/check-mirror-drift.py --repo ebay-seller-tool --managed-blocks --strict
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      - id: sst3-protected-tag-push-guard
        name: SST3 protected-tag push guard (blocks leak of backup/* / pre-* / tmp/* / wip/* local-only safety bookmarks)
        entry: python3 scripts/sst3_protected_tag_guard.py
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
      # <<< END SST3 MANAGED BLOCK — propagated by propagate-block.py <<<

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

default_language_version:
  python: python3

exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    __pycache__/|
    dist/|
    build/|
    uv\.lock
  )

default_stages: [pre-commit, pre-push]
fail_fast: false
