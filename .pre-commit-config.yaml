repos:
  - repo: local
    hooks:
      - id: no-temp-folder
        name: Prevent temp/ and tmp/ folder commits
        entry: bash -c 'TEMP_FILES=$(git diff --cached --name-only | grep -E "^temp/|/temp/|^tmp/|/tmp/"); if [ -n "$TEMP_FILES" ]; then echo "ERROR - temp/tmp folders not allowed in repos."; echo "Use C:/temp/ instead and delete the folder."; echo ""; echo "Blocked files -"; echo "$TEMP_FILES"; exit 1; fi'
        language: system
        pass_filenames: false
        always_run: true

      - id: check-hardcoded-params
        name: Check for hardcoded parameters
        entry: bash scripts/check-hardcoded-params.sh
        language: system
        pass_filenames: false
        always_run: true

      - id: check-public-repo-secrets
        name: Check for secrets in public repo
        entry: python scripts/check-public-repo-secrets.py . --staged-only
        language: system
        pass_filenames: false
        always_run: true

      - id: secret-rules-drift
        name: Secret detection script drift check
        entry: bash
        args:
          - -c
          - |
            CANONICAL=../dotfiles/SST3/scripts/check-public-repo-secrets.py
            LOCAL=scripts/check-public-repo-secrets.py
            [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles not found — drift check skipped" >&2; exit 0; }
            cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR: $LOCAL has drifted. Run: cp $CANONICAL $LOCAL" >&2; exit 1; }
        language: system
        pass_filenames: false
        always_run: true

      - id: check-mirror-drift-self-drift
        name: Self-check that vendored check-mirror-drift.py + sst3_mirror_utils.py match canonical
        entry: bash
        args:
          - -c
          - |
            for f in check-mirror-drift.py sst3_mirror_utils.py; do
              CANONICAL=../dotfiles/SST3/scripts/$f
              LOCAL=scripts/$f
              [ -f "$CANONICAL" ] || { echo "SKIP: dotfiles not found — drift check skipped" >&2; exit 0; }
              cmp -s "$LOCAL" "$CANONICAL" || { echo "ERROR: scripts/$f has drifted from canonical. Run: cp $CANONICAL $LOCAL" >&2; exit 1; }
            done
        language: system
        pass_filenames: false
        always_run: true

      - id: sst3-mirror-drift
        name: SST3 vendored file drift check (manifest-driven)
        entry: python scripts/check-mirror-drift.py --repo ebay-seller-tool
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: trailing-whitespace

default_language_version:
  python: python3

exclude: |
  (?x)^(
    \.git/|
    \.venv/|
    __pycache__/|
    dist/|
    build/|
    uv\.lock
  )

default_stages: [pre-commit, pre-push]
fail_fast: false
