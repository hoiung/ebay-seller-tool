# eBay UK fee schedule + cost assumptions.
# Single source of truth for floor-price math + return-rate calculations.
# Every value cites a public source URL — zero private data in this file.
# Last verified 2026-04-24.
ebay_uk:
  fvf_rate: 0.1548            # 12.9% + 20% VAT. Electronics & Computers category.
                              # source: https://www.ebay.co.uk/sellercentre/news/2026-january/rate-card-change
  per_order_fee_gbp: 0.40     # Raised from 0.30 on 12 Feb 2026. eBay keeps on refunds.
                              # source: https://www.valueaddedresource.net/ebay-raises-final-value-fees-in-uk-germany-2026/
  marketplace_id: "EBAY_GB"   # Used by REST Analytics traffic_report filter.
  site_id: 3                  # Used by ebaysdk Trading siteid kwarg.

postage:
  outbound_gbp: 3.50          # Evri ParcelShop 0-5kg tracked £2.62 + £0.88 buffer.
                              # source: https://www.evri.com/our-services/our-prices
  return_gbp: 3.50            # Seller pays on SNAD/faulty per eBay UK MBG.
                              # source: https://www.ebay.co.uk/help/policies/ebay-money-back-guarantee-policy/ebay-money-back-guarantee-policy?id=4210

packaging_gbp: 0.60           # jiffy bag + bubble + antistatic + label

time_cost:
  mode: sunk                  # "sunk" (default, hobby reseller — time amortised across life) or "marginal"
                              # sunk => sale_gbp/return_gbp used as literal 0; marginal => computed from hourly_rate
  sale_gbp: 0.0               # 0 under sunk mode. If marginal: ~25 min @ hourly_rate.
  return_gbp: 0.0             # 0 under sunk mode. If marginal: ~45 min @ hourly_rate.
  hourly_rate_gbp: 30.0       # reference value if mode switches to marginal later

defaults:
  cogs_gbp: 0.0               # default — override per-SKU when cost differs
  return_rate: 0.10           # conservative placeholder; replaced by live per-SKU rate when Phase 2 compute_return_rate available
  target_margin: 0.15

# Issue #13 Phase 4 — under-pricing detector knobs.
# Used by ebay/analytics.py compute_under_pricing() to flag listings where
# our price < p25_clean AND/OR sales velocity > category median AND/OR
# days-to-sell < 7 (2-of-3 = AMBER, 3-of-3 = RED).
under_pricing:
  velocity_median_default: 0.1   # units sold per day — category-default fallback
                                 # when no per-SKU velocity baseline exists. 0.1
                                 # = 1 unit per 10 days (conservative HDD floor).
  recommended_band_low_pct: 40   # p40 of clean comps = AMBER recommendation
  recommended_band_high_pct: 55  # p55 of clean comps = RED upper recommendation

# Issue #14 (ebay-ops) Phase 3 — wrong-direction-raise WARN config.
# Read by ebay/analytics.py _evaluate_wrong_direction_raise(); fires a
# structured WARN through ebay/client.py log_warn() when update_listing
# raises the price on a listing that has recent sales (velocity > 0) and
# is NOT positioned BELOW_P25 / NOT stock-clearance-exempt / has a usable
# comp pool. Observability — does NOT block the change. See SKILL.md
# "£25 → £35 grounding case" for the historical pattern this auto-flags.
wrong_direction_warn:
  sales_window_days: 14   # window for "did this listing recently sell?"
  min_units_sold: 1       # minimum units sold in window to consider velocity > 0

# Issue #14 Phase 4 — IQR-based price-outlier rejection. Runs between
# drop_stale_competitors and percentile compute. Always log-space for HDD
# pools (max/min > 10 in 5/5 observed sample pools per Stage 1 F-E).
outlier_rejection:
  enabled: true
  method: iqr            # iqr | none
  multiplier: 1.5
  log_transform: true    # bool — log-space IQR for skewed HDD price distributions
  min_pool_size: 6       # skip if fewer than this many comps
  max_drop_frac: 0.20    # never drop more than this fraction (rank by extremity)
  per_condition: false   # v1 — apple-to-apples already stratifies by condition

# Issue #10 Phase 5 — G-NEW-11 compute_return_rates_bulk knobs (Stage 5
# swarm: previously hardcoded as local function-scope variables in
# server.py; surfaced here so operators can override without code change).
return_rates_bulk:
  # Short-circuit threshold: when ≥`min_observations` items have run AND
  # ≥`signature_majority_pct` % of those calls share the same
  # (exception_class, message), abort the loop and surface the systemic
  # failure (auth-token expiry, rate-limit, etc.) rather than cascading
  # silent per-item errors.
  short_circuit_min_observations: 3
  short_circuit_signature_majority_pct: 0.5
  # High-return-rate flagging threshold (operator-visible in JSON summary
  # as `high_return_rate_threshold_pct`). Listings exceeding this rate
  # need a per-SKU floor-price review.
  high_return_rate_threshold_pct: 15.0

# Issue #16 — Best Offer auto-counter thresholds (operator-tunable post-merge).
# Read by:
#   - ebay/analytics.py compute_best_offer_thresholds (config-driven path
#     when caller omits kwargs; explicit kwargs override config — preserves
#     #14 Phase 6 enable_best_offer_all.py + recommend_best_offer_thresholds
#     behaviour for callers that pass DEFAULT_AUTO_ACCEPT_PCT explicitly).
#   - .claude/skills/ebay-seller-tool/scripts/respond_best_offers.py (direct
#     read for the autonomous responder; bypasses the analytics floor-buffer
#     since the responder is the contract author for offers, not a
#     diagnostic suggestion).
# Locked design — operator decision 2026-05-02; do NOT relitigate values
# without operator sign-off. Round-down-to-pound creates psychological
# discount (£23 vs £23.13 on a £25 listing).
best_offer:
  auto_accept_pct:  0.925   # offers ≥ floor(0.925 × live, £) → auto-accept at buyer's offer
  auto_decline_pct: 0.75    # offers < floor(0.75  × live, £) → auto-decline (wild lowballs)
  counter_offer_pct: 0.95   # auto-counter at floor(0.95 × live, £) for offers in [0.75, 0.925) band
  round_down_to_pound: true # apply math.floor() to GBP thresholds (psychological discount)
