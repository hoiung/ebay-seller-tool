# Title + content knobs for the data-driven listing decision toolkit (#13).
#
# Single home for non-pricing-math title configuration. Pricing math (floor
# defaults, fees, postage) lives in config/fees.yaml — kept separate because
# that's the established home for fee-calculation knobs.

title:
  # Filler words that buyers do NOT search by — strip from titles to free up
  # character budget. Per round-2 F-B research. Each entry is matched as a
  # word-bounded phrase (case-insensitive) before tokenisation.
  filler_words:
    - "100% new"
    - "fast shipping"
    - "uk stock"
    - "dispatch"
    - "next day"
    - "tracked"
    - "free shipping"
    - "quick delivery"
    - "genuine"
    - "excellent"
    - "condition"
    - "mint"
    - "unwanted"
    - "clearance"
    - "bundle"
    - "job lot"
    - "joblot"
    - "mixed"
    - "sale"
    - "offer"
    - "price"
    - "reduced"
    - "bargain"
    - "bulk"
    - "wholesale"

  # Preserved 2-3-grams. These collocations are kept as single tokens during
  # tokenisation so "Enterprise Capacity" doesn't decompose into two unrelated
  # tokens. Lower-case form; tokeniser matches case-insensitively.
  preserved_phrases:
    - "enterprise capacity"
    - "iron wolf"
    - "iron wolf pro"
    - "skyhawk ai"
    - "barracuda pro"
    - "hot swap"
    - "self encrypting"

  # Mandatory keyword categories per drive class (from the private skill's
  # "Title Rules" canonical). The category NAMES below are the contract — the
  # orchestrator resolves each category to a literal token using the listing's
  # specifics dict (e.g. Brand → "Seagate") and passes that resolved list as
  # `mandatory_keywords` to compute_keyword_diff.
  mandatory_by_drive_class:
    3.5_inch_sata:
      - Brand
      - Capacity
      - Interface
      - "Form Factor (3.5\")"
      - RPM
      - Series name
      - MPN
    2.5_inch_sata:
      - Brand
      - Capacity
      - Interface
      - "Form Factor (2.5\")"
      - RPM
      - Series name
      - MPN
    sas:
      - HPE
      - Capacity
      - SAS
      - Speed
      - RPM
      - "Form Factor"
      - "B21 part number"

# Issue #14 — apple-to-apples competitor filter quality. Three-layer pipeline
# driven by Browse-API quality signals + price-outlier guard. Layer-1 binary
# hard rejects only for unambiguous junk; seller-quality signals demoted to
# Layer-2 score deductions per Hoi's undercut-to-move-stock strategy.
comp_filter:
  quality_thresholds:
    require_at_least_one_image: true       # Layer-1 binary: image_url is None AND additional_image_count == 0
    soft_min_seller_feedback_pct: 98.0     # Layer-2 deduction trigger
    soft_min_seller_feedback_score: 100    # Layer-2 deduction trigger (proxy: new/unproven seller)
    soft_returns_accepted_required: true   # Layer-2 deduction trigger when returns_accepted is False
    soft_min_returns_within_days: 14       # Layer-2 deduction trigger when present and < this
    soft_top_rated_preferred: true         # Layer-2 deduction trigger (mild)

  quality_deductions:
    seller_feedback_pct: 0.05
    seller_feedback_score: 0.05
    returns_accepted: 0.05
    returns_within_days: 0.05
    top_rated: 0.05

  hard_reject_patterns:
    broken_or_parts:
      - '\b(for parts(\s+(or|and)\s+(not\s+)?(working|repair))?|spares?\s+(or|and)?\s*repair|as[\s-]?is|untested|not\s+(working|tested|fully\s+tested)|defective|faulty|bad\s+sectors?|fail(ed|ing|ure))\b'
    external_or_wrong_form_factor:
      - '\b(external\s+(enclosure|drive|hard\s+drive|hdd|usb)|usb\s+(3\.0|3\.1|hard\s+drive|hdd)|portable\s+(drive|hdd)|nas\s+enclosure|drive\s+enclosure|usb\s+caddy|backup\s+plus)\b'
    wrong_category:
      - '\b(raid\s+(card|controller)|hba\s+(card|controller)|controller\s+card|sas\s+expander|backplane|interposer|sled|caddy\s+only|tray\s+only|bracket\s+only|screws?\s+only)\b'
    bundle:
      - '\b(\d+\s*[x×]\s*(hdd|ssd|drive|disk)|lot\s+of\s+\d+|\d+\s*[-\s]?(pack|pcs?|pieces?|units?)|(joblot|job\s*lot|bundle|set\s+of\s+\d+)|x\s*\d+\s+(drives?|disks?|hdds?))\b'

  # Phase 3.1 — caddy mismatch hard-reject patterns. Triggered ONLY when
  # own_listing has caddy (title contains "+Caddy", or specifics["Features"]
  # contains "Hot Swap"/"Caddy", or has_caddy=True at runtime).
  caddy_mismatch_patterns:
    - '\b(no\s+caddy|without\s+caddy|w/o\s+caddy|sans\s+caddy|caddy\s+not\s+included|bare\s+drive|drive\s+only)\b'

  # Phase 2.3 — numeric conditionId equivalence classes. Comp passes Dim-3
  # condition match when comp.condition_id is in the equivalence set of own's.
  # 7000 (For parts) intentionally excluded — never apple-to-apples for working stock.
  condition_equivalence:
    "1000":                    # New — strict
      - "1000"
    "1500":                    # Opened — tolerate honest 1000
      - "1500"
      - "1000"
    "3000":                    # Used — Hoi's tested-Used floor IS others' Used-Excellent
      - "3000"
      - "2750"
    "2750":                    # Used-Excellent
      - "2750"
      - "3000"

  # Stub #19 — seller-pool concentration knobs. `top_seller_pct > threshold_pct`
  # flags `confidence: low` (monoculture risk — single seller dominates the
  # pool, prices may not represent open-market). `min_pool_size` sets the
  # short-circuit floor below which concentration is not computed.
  concentration:
    threshold_pct: 0.40
    min_pool_size: 4

  # Stub #18 — sibling-MPN allowlist for cross-SKU comp-pool acceptance.
  # Default: empty → ANY own.MPN absent from comp.title is hard-rejected as
  # mpn_mismatch. Add legitimate variant pairs (e.g. 4Kn ↔ 512e of same family)
  # as a bidirectional allowlist when their pricing tracks together.
  # Schema: {own_mpn: [accepted_sibling_mpn_1, accepted_sibling_mpn_2, ...]}.
  # Note: allowlist is one-directional in storage but symmetric expansion is
  # the intended use — add entries on BOTH sides of the pair to guarantee
  # query-direction independence (see browse._is_sibling_allowed).
  sibling_allowlist: {}

  # Phase 3.2 — series names that distinguish SKUs (Seagate HARD CONTRACT et al).
  # When own_listing.title contains one of these, comp title MUST contain the
  # SAME series (case-insensitive) or be hard-rejected.
  series_names:
    - "enterprise capacity"   # vs Exos — Seagate HARD CONTRACT per SKILL.md:112-126
    - "exos"
    - "iron wolf"
    - "iron wolf pro"
    - "barracuda"
    - "barracuda pro"
    - "skyhawk"
    - "skyhawk ai"
    - "ironwolf"              # Seagate spells both ways
    - "ultrastar"             # HGST family
    - "deskstar"              # HGST consumer
    - "travelstar"            # HGST 2.5"
    - "gold"                  # WD enterprise
    - "red"                   # WD NAS
    - "red pro"               # WD NAS pro
    - "purple"                # WD surveillance
