name: Issue/PR body secret scan

# Closes the 2026-04-22 leak class (memory: feedback_public_artefact_leaks_in_issues.md).
# Scans issue bodies, issue comments, PR bodies, and PR review comments for .secret-blocklist matches.
#
# Alert-mechanism design rule (Issue hoiung/dotfiles#438):
#   - NEVER auto-comment on the public issue when a match is detected — that amplifies
#     the leaked content via a second public surface. Fail the workflow run loudly
#     instead (red X in the run list, notifies Hoi via configured GH notifications).
#   - The script itself suppresses matched content from stdout; only line numbers
#     + categories are printed to the Actions log.

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created, edited]
  pull_request:
    types: [opened, edited]

jobs:
  scan:
    name: Scan issue/PR body for secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install dependencies
        run: uv sync
      - name: Scan issue/PR body + comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUMBER="${{ github.event.issue.number || github.event.pull_request.number }}"
          if [ -z "$NUMBER" ]; then
            echo "No issue/PR number in event context; skipping scan."
            exit 0
          fi
          uv run python scripts/check-public-repo-secrets.py \
            --scan-issue-body \
            --issue-number "$NUMBER" \
            --repo "${{ github.repository }}"
