name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          # Commit-message scan step uses `git log <since>..HEAD` against the
          # push's `before` sha. Default shallow-clone depth=1 misses that
          # history, so fetch the full history for this run.
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Python syntax check
        run: |
          find . -name "*.py" -not -path "./.venv/*" -print0 | \
            xargs -0 uv run python -m py_compile

      - name: TOML/YAML/JSON validation
        run: |
          uv run python -c "
          import tomllib, json, pathlib, sys
          errors = []
          for f in pathlib.Path('.').rglob('*.toml'):
              if '.venv' in str(f): continue
              try: tomllib.loads(f.read_text())
              except Exception as e: errors.append(f'{f}: {e}')
          for f in pathlib.Path('.').rglob('*.json'):
              if '.venv' in str(f): continue
              try: json.loads(f.read_text())
              except Exception as e: errors.append(f'{f}: {e}')
          import yaml
          for f in list(pathlib.Path('.').rglob('*.yml')) + list(pathlib.Path('.').rglob('*.yaml')):
              if '.venv' in str(f): continue
              try: yaml.safe_load(f.read_text())
              except Exception as e: errors.append(f'{f}: {e}')
          if errors:
              print('Validation errors:')
              for e in errors: print(f'  {e}')
              sys.exit(1)
          print('All config files valid')
          "

      - name: Secret detection (blocking)
        run: uv run python scripts/check-public-repo-secrets.py .

      - name: Commit-message secret scan (blocking)
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run python scripts/check-public-repo-secrets.py \
            --scan-commit-messages \
            --since ${{ github.event.before }}

      - name: Run pytest
        timeout-minutes: 5
        run: uv run pytest tests/ -x
